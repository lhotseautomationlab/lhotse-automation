name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          # prefer CI install from lockfile, but fallback to legacy peer deps if ERESOLVE occurs
          npm ci || npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build Next.js
        run: npm run build

      - name: Build for Cloudflare (next-on-pages)
        # This uses the official Cloudflare Next adapter to produce a deployable output directory.
        # If you prefer another adapter, replace this step.
        run: npx @cloudflare/next-on-pages@latest build --output ./out

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PROJECT_NAME }}
          directory: './out'
